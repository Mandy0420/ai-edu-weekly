name: 每周更新看板

on:
  schedule:
    - cron: "0 1 * * 1"   # 每周一 01:00 UTC = 北京时间 09:00
  workflow_dispatch: {}    # 允许在网页上手动点“Run workflow”触发

permissions:
  contents: write          # 允许工作流把生成的数据 commit & push 回仓库

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 调研并生成本周数据
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/weekly.json; then
            echo "本周无变化，跳过提交"
          else
            git add data/weekly.json
            git commit -m "data: 自动更新 $(date -u +%Y-%m-%d) 周报"
            git push
          fi
