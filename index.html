<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>国外 AI+教育新品 · 每周看板</title>
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#1d1d1f; --sub:#6e6e73;
    --line:#ececf0; --accent:#2f6bff; --chip:#f0f2f5; --chip-ink:#3a3a3e;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0e0f12; --card:#17181c; --ink:#f2f2f4; --sub:#9a9aa2;
      --line:#26272d; --accent:#5b8cff; --chip:#22242a; --chip-ink:#c7c8cf;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:920px; margin:0 auto; padding:56px 24px 96px;}
  header.top{margin-bottom:40px;}
  .kicker{font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); font-weight:600;}
  h1{font-size:32px; line-height:1.2; margin:10px 0 8px; font-weight:700; letter-spacing:-.01em;}
  .meta{color:var(--sub); font-size:14px;}
  .week{margin-top:44px;}
  .week-head{display:flex; align-items:baseline; gap:14px; margin-bottom:18px; padding-bottom:12px; border-bottom:1px solid var(--line);}
  .week-no{font-size:22px; font-weight:700; letter-spacing:-.01em;}
  .week-range{color:var(--sub); font-size:14px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media (max-width:640px){ .grid{grid-template-columns:1fr;} h1{font-size:26px;} .wrap{padding:40px 18px 72px;} }
  .card{
    background:var(--card); border-radius:18px; padding:22px 22px 20px;
    box-shadow:var(--shadow); display:flex; flex-direction:column; gap:10px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .card:hover{transform:translateY(-2px);}
  .card h3{margin:0; font-size:18px; font-weight:650;}
  .card h3 a{color:inherit; text-decoration:none;}
  .card h3 a:hover{color:var(--accent);}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{background:var(--chip); color:var(--chip-ink); font-size:12px; padding:3px 10px; border-radius:999px; font-weight:500;}
  .one{font-size:14.5px; color:var(--ink);}
  .why{font-size:13.5px; color:var(--sub);}
  .why b{color:var(--ink); font-weight:600;}
  .src{margin-top:2px; font-size:12px;}
  .src a{color:var(--accent); text-decoration:none;}
  .empty{background:var(--card); border-radius:18px; padding:40px; text-align:center; color:var(--sub); box-shadow:var(--shadow);}
  footer{margin-top:64px; color:var(--sub); font-size:12.5px; text-align:center;}
  .sample-tag{display:inline-block; margin-left:8px; font-size:11px; background:var(--chip); color:var(--sub); padding:2px 8px; border-radius:999px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="kicker">Weekly Radar</div>
    <h1>国外 AI + 教育新品 · 每周看板</h1>
    <div class="meta" id="meta">加载中…</div>
  </header>
  <main id="feed"></main>
  <footer>
    每周由云端 Agent 自动搜集 · 数据源 <span id="foot-src">Product Hunt / Hacker News / 各家 AI 教育 newsletter</span><br/>
    只收录海外、且与 AI×教育相关的新产品
  </footer>
</div>

<script>
const CATEGORY = "分类", COUNTRY = "地区";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const chips = [it.country, it.category].filter(Boolean)
    .map(c=>`<span class="chip">${esc(c)}</span>`).join("");
  const title = it.url
    ? `<a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.name)}</a>`
    : esc(it.name);
  const why = it.why_it_matters ? `<div class="why"><b>为什么值得看：</b>${esc(it.why_it_matters)}</div>` : "";
  const src = it.source ? `<div class="src"><a href="${esc(it.source_url||it.url||'#')}" target="_blank" rel="noopener">来源：${esc(it.source)}</a></div>` : "";
  return `<div class="card">
    <h3>${title}</h3>
    <div class="chips">${chips}</div>
    <div class="one">${esc(it.one_liner||"")}</div>
    ${why}${src}
  </div>`;
}
function weekBlock(w){
  const sample = w.sample ? `<span class="sample-tag">示例 · 首次真实运行后替换</span>` : "";
  const items = (w.items||[]).map(card).join("");
  return `<section class="week">
    <div class="week-head">
      <span class="week-no">${esc(w.week||"")}${sample}</span>
      <span class="week-range">${esc(w.date_range||"")}</span>
    </div>
    <div class="grid">${items}</div>
  </section>`;
}
fetch("data/weekly.json?ts="+Date.now())
  .then(r=>r.json())
  .then(list=>{
    list = Array.isArray(list)?list.slice():[];
    // newest week first
    list.sort((a,b)=> String(b.week||"").localeCompare(String(a.week||"")));
    const feed = document.getElementById("feed");
    const meta = document.getElementById("meta");
    if(!list.length){
      feed.innerHTML = `<div class="empty">还没有数据 —— 等第一次周报跑完就会出现在这里。</div>`;
      meta.textContent = "尚无数据";
      return;
    }
    const latest = list[0];
    const total = list.reduce((n,w)=>n+((w.items||[]).length),0);
    meta.textContent = `已收录 ${list.length} 周 · 共 ${total} 款产品 · 最近更新 ${latest.generated_at||latest.date_range||latest.week}`;
    feed.innerHTML = list.map(weekBlock).join("");
  })
  .catch(e=>{
    document.getElementById("feed").innerHTML = `<div class="empty">数据加载失败：${esc(e.message)}</div>`;
    document.getElementById("meta").textContent = "加载失败";
  });
</script>
</body>
</html>
